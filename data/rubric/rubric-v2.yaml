version: rubric-v2
description: AM Copilot admissions call scoring rubric — Phase A
last_updated: "2026-05"
status: draft  # pending client sign-off on compliance_override rule

changelog:
  rubric-v2:
    date: "2026-05"
    reason: >
      D8 calibration showed 57% overall agreement (target 80%). Two dimensions
      failed the 70% per-dimension threshold. Changes below reflect post-regrade
      diagnosis: objection_handling needed a definitional clarification (grader
      was reading "objection" narrowly); compliance_language needed a substantive
      rewrite (AI and human were genuinely diverging on what the criteria meant).
      Six passing dimensions are unchanged.
    changes:
      - dimension: objection_handling
        type: clarification
        what: >
          Expanded description to define what counts as an "objection" with four
          anchor categories. score_for and score_against are unchanged.
      - dimension: compliance_language
        type: rewrite
        what: >
          New description organizing three failure modes explicitly. New score_for
          and score_against criteria with concrete anchor phrases and sub-group
          labels. Added score_anchors (per-level anchors) to close the gap between
          human and AI scoring: AI was treating absence of obvious violations as a
          5; human was applying a stricter execution quality standard. Anchors
          define what each level looks like concretely.

scoring_scale:
  levels:
    - score: 5
      label: Exemplary
      anchor: "A call you would use in agent training. Nothing to improve."
    - score: 4
      label: Strong
      anchor: "Solid work. One small coaching note at most."
    - score: 3
      label: Acceptable
      anchor: "Got the job done. Nothing wrong, nothing notable."
    - score: 2
      label: "Needs improvement"
      anchor: "Identifiable gaps a coaching session would address."
    - score: 1
      label: Poor
      anchor: "Significant problems on this dimension."
    - score: 0
      label: Unacceptable
      anchor: "Actively wrong, or a required step skipped entirely."
  na_label: "N/A"
  na_rule: "Excluded from weighted average entirely. N/A is NOT zero."

overall_score_formula: |
  For each applicable (non-N/A) dimension:
    weighted_score = raw_score * weight
  overall = (sum of weighted_scores) / (sum of weights for applicable dimensions) * 20
  Result is 0–100, rounded to nearest integer.

compliance_override:
  pending_client_signoff: true
  rule: >
    If dimension compliance_language receives raw_score = 0, the overall call score
    is overridden to 0 regardless of all other dimension scores.

dimensions:

  - id: empathy_rapport
    name: "Empathy & rapport"
    weight: 1.5
    na_allowed: false
    description: >
      Did the agent acknowledge the caller's emotional state and build trust
      in the first 60 seconds?
    score_for:
      - Agent slowed down and listened
      - Matched the caller's emotional register
      - Did not sound scripted or transactional
      - Used the caller's name
      - Acknowledged the difficulty of the situation before moving to information gathering
    score_against:
      - Jumping straight to intake questions without acknowledgement
      - Flat or robotic tone
      - Talking over the caller's emotional disclosures

  - id: insurance_verification
    name: "Insurance verification"
    weight: 1.0
    na_allowed: true
    na_condition: >
      Caller explicitly stated self-pay and agent confirmed and pivoted correctly.
      Score the pivot under objection_handling instead.
    description: >
      Did the agent collect and verify the right coverage details, in the right
      order, without losing the caller?
    score_for:
      - Carrier, plan type, member ID, and group number captured
      - Verification framed as a step toward help, not gatekeeping
      - Pivot to alternatives (self-pay, financing, sliding scale) if coverage was a problem
      - Did not overwhelm caller with insurance jargon
    score_against:
      - Missing key fields (member ID, group number)
      - Making coverage sound like a barrier
      - No alternative offered when coverage was insufficient

  - id: clinical_screening
    name: "Clinical screening"
    weight: 1.0
    na_allowed: true
    na_condition: >
      Very short calls that were redirected before screening could begin.
    description: >
      Did the agent ask the right diagnostic-adjacent questions to understand
      what the caller needs — without overstepping into clinical territory?
    score_for:
      - Substance use history and type captured
      - Severity indicators surfaced (frequency, last use, withdrawal symptoms)
      - Prior treatment history asked
      - Co-occurring mental health concerns noted if volunteered
      - Agent stayed clearly in intake role — did not diagnose or clinically assess
    score_against:
      - Missing substance use history entirely
      - Crossing into clinical territory (e.g. "that sounds like you have a dependency")
      - Asking leading or diagnostic questions (e.g. "do you think you're an addict?")

  - id: urgency_triage
    name: "Urgency triage"
    weight: 1.0
    na_allowed: true
    na_condition: >
      Caller explicitly stated they were researching for a future need and
      there were no urgency signals.
    description: >
      Did the agent correctly assess whether this is a same-day, this-week,
      or future need — and act on it?
    score_for:
      - Urgency signals caught (withdrawal, suicidal ideation, recent overdose, unsafe living situation)
      - Appropriate escalation when urgency was high
      - Correct de-escalation when urgency was low — no manufactured urgency
      - Crisis protocol activated when suicidal ideation or overdose mentioned
    score_against:
      - Missing clear urgency signals in the transcript
      - Treating a crisis caller like a routine inquiry
      - Manufacturing urgency to pressure a non-urgent caller

  - id: family_caller_handling
    name: "Family caller handling"
    weight: 1.0
    na_allowed: true
    na_condition: Caller is the patient themselves (confirmed in transcript).
    description: >
      When the caller is a family member, did the agent navigate consent,
      information boundaries, and the family member's own distress correctly?
    score_for:
      - HIPAA and consent framing handled without being legalistic or cold
      - Right information about the patient collected without speaking for the patient
      - Family member's own emotional state acknowledged
      - Agent explained what the family member can and cannot do
    score_against:
      - Collecting patient information without consent framing
      - Ignoring the family member's distress
      - Giving clinical information about the patient without appropriate framing

  - id: objection_handling
    name: "Objection handling"
    weight: 1.0
    na_allowed: true
    na_condition: >
      Calls where no objections were raised and the caller was fully
      cooperative throughout.
    description: >
      An "objection" is any expressed or implied resistance, hesitation, or concern
      that threatens caller engagement — regardless of form or topic. This includes
      transactional objections (cost, insurance, scheduling, time commitment),
      emotional objections (fear of treatment, shame, embarrassment, ambivalence
      about change), reputational objections (stigma, professional identity concerns
      — e.g. "I'm a teacher and I can't have this on my record"), and skepticism
      objections (prior treatment failure, distrust of the process — e.g. "rehab
      didn't work last time"). Ambivalence and deflection count as objections even
      when never stated as explicit pushback. Score N/A only if the caller was
      fully cooperative throughout with no expressed concern of any kind.

      When cost, fear, family pressure, or ambivalence came up, did the agent
      address it constructively?
    score_for:
      - Acknowledged the objection before responding (did not immediately counter)
      - Offered concrete alternatives where relevant (financing, family support, peer stories)
      - Avoided defensive, dismissive, or salesy language
      - Did not push past a stated "no" inappropriately
    score_against:
      - Jumping to counter-arguments before acknowledging the concern
      - Repeating the same response when the caller pushed back
      - High-pressure tactics
      - Giving up entirely on a wavering caller who still wanted help

  - id: next_step_clarity
    name: "Next-step clarity"
    weight: 1.0
    na_allowed: true
    na_condition: >
      Calls that ended because the caller was not eligible or declined to proceed.
    description: >
      Did the caller leave the call knowing exactly what happens next, by when,
      and who owns it?
    score_for:
      - Specific next step set (admissions appointment, callback, document submission)
      - Timing stated clearly
      - Ownership clear
      - Follow-up commitments captured in the system (agent confirmed verbally)
    score_against:
      - Vague close ("we'll be in touch")
      - No next step set before ending the call
      - Timing unclear or missing
      - Caller had to ask what happens next

  - id: compliance_language
    name: "Compliance language"
    weight: 1.5
    na_allowed: false
    compliance_override_trigger: true  # score of 0 triggers overall override (pending sign-off)
    description: >
      Did the agent stay on the right side of what an intake coordinator — not a
      clinician — is licensed to say? Three failure modes: (1) Diagnostic language
      — labeling, characterizing, or clinically assessing the caller's condition;
      (2) Outcome language — promising or implying treatment will succeed;
      (3) Scope overreach — providing clinical or medical information that belongs
      to a licensed professional. Score based on how many failure modes appear and
      how severe each instance is.
    score_for:
      - "*Diagnostic:* No diagnostic labels or clinical characterizations applied\
        \ (\"that sounds like X\", \"you have Y\")"
      - "*Diagnostic:* Medical or clinical topics explicitly deferred (\"our clinical\
        \ team will assess that\", \"that's a question for your doctor\")"
      - "*Outcome:* No explicit or implied treatment success promises; reassurance\
        \ is emotional (\"I'm glad you called\"), not predictive (\"treatment will\
        \ work for you\")"
      - "*Scope:* Agent stays in intake lane: gathering information, explaining\
        \ process, connecting to services — not explaining clinical mechanisms or\
        \ medical safety protocols"
      - "*Scope:* Any insurance or coverage language is explicitly hedged\
        \ (\"pending verification\", \"our benefits team will confirm\")"
    score_against:
      - "*Diagnostic:* Labeling a condition as fact (\"that's benzo dependence\",\
        \ \"that sounds like stimulant withdrawal\" stated without immediate deferral)"
      - "*Diagnostic:* Clinical characterization framed as educational but not\
        \ deferred (\"stopping benzos abruptly is medically dangerous\" — belongs\
        \ to a nurse or doctor, not intake)"
      - "*Outcome:* Soft outcome promises that imply a guarantee of success (e.g.,\
        \ \"treatment can work for you this time\", \"you're going to get what you\
        \ need here\"). Note: warm closing reassurance like \"we'll make sure the\
        \ plan is right\" is acceptable when grounded in a concrete commitment that\
        \ follows (aftercare plan, specific support); it's only a violation when\
        \ the implied promise is success itself."
      - "*Outcome:* Framing that implies prior-treatment failure was a fixable\
        \ design problem the center will solve (\"this time we'll design it\
        \ differently\") — creates implicit success expectation"
      - "*Scope:* Coverage or cost guarantees before verification is complete\
        \ (\"your insurance should cover most of it\")"
      - "*Scope:* Explaining clinical mechanisms (withdrawal pathways, medication\
        \ taper risks) rather than deferring"
    score_anchors:
      5: >-
        Perfect boundary discipline. All clinical/medical topics deferred.
        Reassurance is warm but not predictive. No coverage statements before
        verification.
      4: >-
        One borderline moment — a soft phrase that could be read either way —
        immediately contextualized or followed by appropriate deferral. No pattern.
      3: >-
        Educational-clinical language used without immediate deferral (e.g.,
        explaining withdrawal in detail), OR vague reassurance that implies
        success without explicit guarantee. Single instance, no escalation.
      2: >-
        Multiple borderline instances in a pattern, OR one clear scope overreach
        (e.g., explaining that a medication taper is "medically dangerous"), OR a
        soft coverage statement before verification.
      1: >-
        One clear violation — explicit outcome implication, diagnostic
        characterization stated as fact, or coverage guarantee before verification.
        An auditor would flag this in a compliance review.
      0: >-
        Direct diagnostic claim, treatment success guarantee, or statement
        constituting unauthorized practice of medicine.
    prohibited_phrases_detected_by: compliance_engine  # deterministic pre-pass, not LLM
